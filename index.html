function getWeekSeed(){const d=new Date();return`${d.getFullYear()}-${d.getMonth()}-${Math.ceil(d.getDate()/7)}`;}
function seededShuffle(arr,seed){
  const a=[...arr];let s=seed.split("").reduce((a,c)=>a+c.charCodeAt(0),0);
  for(let i=a.length-1;i>0;i--){s=(s*9301+49297)%233280;const j=Math.floor(s/233280*i);[a[i],a[j]]=[a[j],a[i]];}
  return a;
}
function pickRec(kid,readSet,rMap){
  const pool=BOOKS[kid].filter(b=>!readSet.has(b.t));
  if(!pool.length)return[];
  const liked=new Set(Object.entries(rMap).filter(([,v])=>v>=4).map(([t])=>BOOKS[kid].find(b=>b.t===t)?.a).filter(Boolean));
  return seededShuffle([...pool.filter(b=>liked.has(b.a)),...pool.filter(b=>!liked.has(b.a))],getWeekSeed()+kid).slice(0,3);
}
function pickFlower(title){
  const s=title.split("").reduce((a,c)=>a+c.charCodeAt(0),0);
  return FLOWERS[s%FLOWERS.length];
}
function el(tag,attrs,...ch){
  const e=document.createElement(tag);
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{
    if(k==="style"&&typeof v==="object")Object.assign(e.style,v);
    else if(k.startsWith("on"))e.addEventListener(k.slice(2).toLowerCase(),v);
    else e.setAttribute(k,v);
  });
  ch.flat().forEach(c=>{if(c==null)return;e.appendChild(typeof c==="string"?document.createTextNode(c):c);});
  return e;
}
function svgEl(code){const d=document.createElement("div");d.innerHTML=code;return d.firstChild;}

      const st=getStore();const kd2=st[S.kid]||{read:[],borrowed:[]};
      const bl=[...(kd2.borrowed||[])];const i2=bl.indexOf(book.t);
      if(i2>=0)bl.splice(i2,1);else bl.push(book.t);
      st[S.kid]={...kd2,borrowed:bl};setStore(st);renderList();
    });
    btns.appendChild(bBtn);
    if(done){
      const bf=el("button",{style:{padding:"5px 8px",borderRadius:"8px",border:"none",background:"#E8F5E9",color:"#2E7D32",fontSize:"11px",fontWeight:"600",cursor:"pointer"}},"경독");
      bf.addEventListener("click",()=>{S.bfGuide=book;S.bfStep=0;render();});
      btns.appendChild(bf);
    } else {
      const rb=el("button",{style:{padding:"5px 9px",borderRadius:"8px",border:"none",background:C.btn,color:"#fff",fontSize:"11px",fontWeight:"600",cursor:"pointer"}},"읽었어요");

}

  return wrap;

function buildReviewForm(C,isEdit){
  const target=isEdit?S.editTarget:S.reviewTarget;
  const star=isEdit?S.editStar:S.reviewStar;
  const text=isEdit?S.editText:S.reviewText;
  const card=el("div",{style:{background:"#fff",borderRadius:"20px",padding:"22px",border:`2.5px solid ${C.border}`,boxShadow:`0 4px 20px ${C.soft}88`}});
  card.appendChild(el("div",{style:{fontSize:"12px",color:"#bbb",marginBottom:"4px"}},isEdit?"감상평 수정하기":"읽은 책 기록하기"));
  card.appendChild(el("div",{style:{fontWeight:"800",fontSize:"18px",color:C.text,lineHeight:"1.3",marginBottom:"3px"}},target.t));
  card.appendChild(el("div",{style:{fontSize:"12px",color:"#ccc",marginBottom:"20px"}},target.a+" · "+target.p));
  card.appendChild(el("div",{style:{fontWeight:"700",color:C.text,fontSize:"14px",marginBottom:"10px"}},"얼마나 재밌었어? 😊"));
  const fr=el("div",{style:{display:"flex",gap:"6px",marginBottom:"20px"}});
  [1,2,3,4,5].forEach(n=>{
    const on=star===n;
    const fb=el("button",{style:{flex:"1",padding:"10px 0",borderRadius:"14px",border:`2.5px solid ${on?C.btn:C.border}`,background:on?C.card:"#fff",cursor:"pointer",transition:"all .15s"}},
      el("div",{style:{fontSize:"26px"}},FACE[n-1]),el("div",{style:{fontSize:"9px",color:on?C.text:"#bbb",fontWeight:on?"700":"400",marginTop:"2px"}},FACE_LABEL[n-1]));
    fb.addEventListener("click",()=>{if(isEdit)S.editStar=n;else S.reviewStar=n;render();});
    fr.appendChild(fb);
  });
  card.appendChild(fr);
  card.appendChild(el("div",{style:{fontWeight:"700",color:C.text,fontSize:"14px",marginBottom:"8px"}},"한 줄 독서평 ✏️ ",el("span",{style:{fontWeight:"400",color:"#bbb",fontSize:"12px"}},"(선택)")));
  const ta=el("textarea",{placeholder:"이 책을 읽고 어떤 느낌이 들었어?",style:{width:"100%",height:"88px",padding:"11px 13px",borderRadius:"12px",border:`2px solid ${C.border}`,fontSize:"16px",resize:"none",outline:"none",color:"#333",lineHeight:"1.5",display:"block"}});
  ta.value=text;
  ta.addEventListener("input",e=>{if(isEdit)S.editText=e.target.value;else S.reviewText=e.target.value;});
  card.appendChild(ta);
  const sub=el("button",{style:{width:"100%",marginTop:"14px",padding:"15px 0",borderRadius:"16px",background:C.btn,color:"#fff",fontWeight:"800",fontSize:"17px",border:"none",cursor:"pointer",boxShadow:`0 3px 14px ${C.btn}55`}},isEdit?"수정 완료! ✅":"기록 완료! 🎉");
  sub.addEventListener("click",()=>{
    const store=getStore();const kd=store[S.kid]||{read:[],borrowed:[]};
    if(isEdit){
      const upd=[...(kd.read||[])];
      upd[S.editIdx]={...upd[S.editIdx],review:S.editText,rating:S.editStar};
      store[S.kid]={...kd,read:upd};setStore(store);
      S.editTarget=null;S.tab="read";render();
    } else {
      const flower=pickFlower(target.t);
      const isNew=!(kd.read||[]).some(r=>pickFlower(r.t).n===flower.n);
      const entry={...target,review:S.reviewText,rating:S.reviewStar,date:new Date().toLocaleDateString("ko-KR"),bfDone:false};
      store[S.kid]={...kd,read:[entry,...(kd.read||[])]};setStore(store);
      S.doneBook=target;S.reviewTarget=null;
      S.newBadge=isNew?flower:null;
      S.tab="done";render();
    }
  });
  card.appendChild(sub);
  return card;
}

  const libBtn=el("button",{style:{width:"100%",marginTop:"10px",padding:"8px",borderRadius:"10px",border:"2px dashed #90CAF9",background:"#EBF5FB",color:"#1565C0",fontSize:"12px",fontWeight:"600",cursor:"pointer"}},"📚 안동시어린이도서관 소장 확인");
  libBtn.addEventListener("click",()=>{
    const url="https://lib.andong.go.kr/search/tot/result.ax?searchText="+encodeURIComponent(book.t)+"&libCode=ALL";
    window.open(url,"_blank");

  const bRow=el("div",{style:{display:"flex",gap:"8px",marginTop:"8px"}});
  const bBtn=el("button",{style:{flex:"1",padding:"8px",borderRadius:"10px",border:`1.5px solid ${bor?"#FFD54F":"#e0e0e0"}`,background:bor?"#FFFDE7":"#f9f9f9",color:bor?"#7B5800":"#888",fontSize:"12px",fontWeight:"600",cursor:"pointer"}},bor?"📋 빌리는 중":"📋 빌린 책 표시");

  bRow.appendChild(bBtn);
  if(!readSet.has(book.t)){
    const rb=el("button",{style:{flex:"1",padding:"8px",borderRadius:"10px",background:C.btn,color:"#fff",fontWeight:"700",fontSize:"12px",border:"none",cursor:"pointer",boxShadow:`0 2px 8px ${C.btn}44`}},"다 읽었어요! ✏️");
    rb.addEventListener("click",()=>{S.reviewTarget=book;S.reviewText="";S.reviewStar=3;S.tab="review";render();});
    bRow.appendChild(rb);
  }
  card.appendChild(bRow);
  return card;
}

function buildReadCard(r,C,deleteIdx){
  const flower=pickFlower(r.t);
  const bfDone=r.bfDone||false;
  const card=el("div",{style:{background:"#fff",borderRadius:"14px",padding:"13px 14px",marginBottom:"10px",border:`1.5px solid ${C.border}`}});
  const topRow=el("div",{style:{display:"flex",gap:"12px",alignItems:"flex-start"}});
  topRow.appendChild(el("div",{style:{width:"40px",height:"40px",borderRadius:"12px",flexShrink:"0",background:flower.c+"33",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"22px",border:`2px solid ${flower.c}`}},flower.e));
  const body2=el("div",{style:{flex:"1",minWidth:"0"}});
  body2.appendChild(el("div",{style:{fontWeight:"700",fontSize:"14px",color:C.text,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}},r.t));
  body2.appendChild(el("div",{style:{fontSize:"11px",color:"#bbb"}},r.a+(r.date?" · "+r.date:"")));
  body2.appendChild(el("div",{style:{fontSize:"12px",color:C.btn,margin:"3px 0"}},"⭐".repeat(r.rating)+"☆".repeat(5-r.rating)));
  if(r.review)body2.appendChild(el("div",{style:{fontSize:"13px",color:"#555",fontStyle:"italic",background:"#fafafa",padding:"6px 10px",borderRadius:"8px",marginTop:"4px",borderLeft:`3px solid ${C.border}`}},'"'+r.review+'"'));
  topRow.appendChild(body2);
  if(deleteIdx!==null){
    const del=el("button",{style:{background:"none",border:"none",color:"#ddd",fontSize:"20px",cursor:"pointer",flexShrink:"0",lineHeight:"1",padding:"0 2px"}},"×");
    del.addEventListener("click",()=>{
      if(!confirm("정말 삭제할까요?"))return;
      const store=getStore();const kd=store[S.kid]||{read:[],borrowed:[]};
      store[S.kid]={...kd,read:(kd.read||[]).filter((_,j)=>j!==deleteIdx)};
      setStore(store);render();
    });
    topRow.appendChild(del);
  }
  card.appendChild(topRow);

  // 버튼 행: 수정 + 경독 활동 체크
  const btnRow=el("div",{style:{display:"flex",gap:"6px",marginTop:"10px"}});
  if(deleteIdx!==null){
    // ★ 수정2: 감상평 수정 버튼
    const editBtn=el("button",{style:{flex:"1",padding:"7px",borderRadius:"9px",border:`1.5px solid ${C.border}`,background:"#f9f9f9",color:C.text,fontSize:"12px",fontWeight:"600",cursor:"pointer"}},"✏️ 수정");
    editBtn.addEventListener("click",()=>{S.editTarget=r;S.editIdx=deleteIdx;S.editText=r.review||"";S.editStar=r.rating;S.tab="edit";render();});
    btnRow.appendChild(editBtn);
  }
  // ★ 수정4: 경북독서친구 활동 체크 (완료 전/후 분기)
  const bfBtn=el("button",{style:{flex:"2",padding:"7px",borderRadius:"9px",border:`1.5px solid ${bfDone?"#4CAF50":"#C8E6C9"}`,background:bfDone?"#E8F5E9":"#F9FBE7",color:bfDone?"#2E7D32":"#9E9D24",fontSize:"12px",fontWeight:"600",cursor:"pointer"}},
    bfDone?"✅ 경북독서친구 완료":"⬜ 경독 활동 미완료 (탭하여 시작)");
  bfBtn.addEventListener("click",()=>{
    if(!bfDone){
      // 미완료: 경독 안내 모달 열고, 완료 처리는 사용자가 확인 후
      S.bfGuide=r;S.bfStep=0;
      // 완료 처리를 위한 콜백 저장
      S._bfCompleteIdx=(deleteIdx!==null)?deleteIdx:-1;
      render();
    } else {
      // 완료 → 미완료 토글
      if(!confirm("경북독서친구 활동 완료를 취소할까요?"))return;
      const store=getStore();const kd=store[S.kid]||{read:[],borrowed:[]};
      const upd=[...(kd.read||[])];
      if(deleteIdx!==null)upd[deleteIdx]={...upd[deleteIdx],bfDone:false};
      store[S.kid]={...kd,read:upd};setStore(store);render();
    }
  });
  btnRow.appendChild(bfBtn);
  card.appendChild(btnRow);
  return card;
}

function buildDoneScreen(C){
  const wrap=el("div",{});
  const card=el("div",{style:{background:"#fff",borderRadius:"20px",padding:"24px",border:`2.5px solid ${C.border}`,textAlign:"center"}});
  card.appendChild(el("div",{style:{fontSize:"52px",marginBottom:"8px"}},"🎉"));
  card.appendChild(el("div",{style:{fontWeight:"800",fontSize:"20px",color:C.text,marginBottom:"4px"}},"완독 완료!"));
  card.appendChild(el("div",{style:{fontWeight:"600",fontSize:"15px",color:"#555",marginBottom:"4px"}},`「${S.doneBook.t}」`));
  const fl=pickFlower(S.doneBook.t);
  card.appendChild(el("div",{style:{fontSize:"30px",margin:"8px 0"}},fl.e));
  card.appendChild(el("div",{style:{fontSize:"13px",color:"#888",marginBottom:"20px"}},"[ "+fl.n+" ] 뱃지를 획득했어요!"));
  const bfCard=el("div",{style:{background:"#F1F8E9",borderRadius:"16px",padding:"14px",marginBottom:"12px",border:"2px solid #C8E6C9",textAlign:"left",cursor:"pointer"}});
  const bfRow=el("div",{style:{display:"flex",alignItems:"center",gap:"10px",marginBottom:"6px"}});
  bfRow.appendChild(bookIcon(30,"#4CAF50"));
  bfRow.appendChild(el("div",{style:{flex:"1"}},el("div",{style:{fontWeight:"800",color:"#2E7D32",fontSize:"14px"}},"경북독서친구 독후활동 하기"),el("div",{style:{fontSize:"11px",color:"#66BB6A"}},"인증 → 독후활동 → 하트 받기 🏆")));
  bfRow.appendChild(el("div",{style:{fontSize:"18px",color:"#4CAF50"}},"→"));
  bfCard.appendChild(bfRow);
  bfCard.appendChild(el("div",{style:{fontSize:"12px",color:"#555",lineHeight:"1.6"}},"① 로그인 → ② 읽은 책 인증(6문제 중 4개↑) → ③ 독후활동 올리기\n연 4회 우수학생 도서상품권 시상! 🎁"));
  bfCard.addEventListener("click",()=>{S.bfGuide=S.doneBook;S.bfStep=0;render();});
  card.appendChild(bfCard);
  const libCard=el("div",{style:{background:"#EBF5FB",borderRadius:"14px",padding:"12px 14px",marginBottom:"16px",border:"2px solid #90CAF9",textAlign:"left",cursor:"pointer"}});
  libCard.appendChild(el("div",{style:{display:"flex",alignItems:"center",gap:"10px"}},
    el("div",{style:{fontSize:"26px"}},"🏛️"),
    el("div",{style:{flex:"1"}},el("div",{style:{fontWeight:"700",color:"#1565C0",fontSize:"14px"}},"안동시어린이시립도서관"),el("div",{style:{fontSize:"11px",color:"#64B5F6"}},"다음 읽을 책 빌리러 가기")),
    el("div",{style:{fontSize:"18px",color:"#90CAF9"}},"→")));
  libCard.addEventListener("click",()=>window.open(LIB_HOME,"_blank"));
  card.appendChild(libCard);
  const homeBtn=el("button",{style:{width:"100%",padding:"13px",borderRadius:"14px",background:C.btn,color:"#fff",fontWeight:"700",fontSize:"15px",border:"none",cursor:"pointer"}},"홈으로 돌아가기");
  homeBtn.addEventListener("click",()=>{S.tab="home";render();});
  card.appendChild(homeBtn);
  wrap.appendChild(card);
  return wrap;
}

function buildBadgePopup(){
  const f=S.newBadge;
  const overlay=el("div",{style:{position:"fixed",inset:"0",background:"rgba(0,0,0,0.65)",zIndex:"1000",display:"flex",alignItems:"center",justifyContent:"center"}});
  const modal=el("div",{style:{background:"#fff",borderRadius:"24px",padding:"32px 28px",textAlign:"center",maxWidth:"280px",width:"88%",boxShadow:"0 8px 40px #0004"}});
  modal.appendChild(el("div",{style:{fontSize:"64px",marginBottom:"10px"},"class":"badge-pop"},f.e));
  modal.appendChild(el("div",{style:{fontWeight:"800",fontSize:"22px",color:"#333",marginBottom:"6px"}},"새 꽃 뱃지 획득! 🎉"));
  modal.appendChild(el("div",{style:{fontWeight:"700",fontSize:"18px",color:"#555",marginBottom:"8px"}},"[ "+f.n+" ]"));
  modal.appendChild(el("div",{style:{fontSize:"13px",color:"#888",marginBottom:"20px"}},"뱃지 정원에서 확인해보세요!"));
  const btn=el("button",{style:{width:"100%",padding:"13px",borderRadius:"14px",background:f.c,color:"#fff",fontWeight:"700",fontSize:"16px",border:"none",cursor:"pointer"}},"와! 신기해! 🌸");
  btn.addEventListener("click",()=>{S.newBadge=null;render();});
  modal.appendChild(btn);
  overlay.appendChild(modal);
  return overlay;
}

function buildBFGuide(){
  const steps=[
    {icon:"🔑",title:"경북독서친구 로그인",desc:"bookfriend.info.go.kr 에서\n아이 계정으로 로그인합니다.",url:`${BF}/login/login.do`,btn:"로그인 페이지 열기"},
    {icon:"📚",title:"읽은 책 인증 받기",desc:"독후활동 > 초등학교 > 권장도서/인증\n> 읽은 책 인증받기\n\n6문제 중 4개 이상 맞으면 인증 완료!\n미통과 시 2시간 후 재응시 가능",url:`${BF}/elibbook/certBookList.do`,btn:"인증 페이지 열기"},
    {icon:"✏️",title:"온라인 독후활동 하기",desc:"독후활동 > 권장도서 독후활동\n\n독후감·그림·사진·만화 등 다양한 방식!\n매 분기 우수학생 도서상품권 수여 🎁",url:`${BF}/elibbook/bookRptWrite.do`,btn:"독후활동 페이지 열기"},
    {icon:"❤️",title:"평가(하트) 받기",desc:"심사위원 선생님 52명이\n올린 독후활동을 심사하고 하트를 부여!\n\n연 4회 우수학생 선발해 시상 🏆",url:null,btn:null},
  ];
  const s=steps[S.bfStep];
  const overlay=el("div",{style:{position:"fixed",inset:"0",background:"rgba(0,0,0,0.55)",zIndex:"999",display:"flex",alignItems:"flex-end",justifyContent:"center"}});
  const modal=el("div",{style:{background:"#fff",borderRadius:"24px 24px 0 0",width:"100%",maxWidth:"600px",padding:`24px 20px max(36px,env(safe-area-inset-bottom))`,boxShadow:"0 -4px 32px #0004"}});
  const hRow=el("div",{style:{display:"flex",alignItems:"center",gap:"10px",marginBottom:"20px"}});
  hRow.appendChild(bookIcon(36,"#4CAF50"));
  hRow.appendChild(el("div",{style:{flex:"1"}},el("div",{style:{fontWeight:"800",fontSize:"15px",color:"#2E7D32"}},"경북독서친구 독후활동 절차"),el("div",{style:{fontSize:"11px",color:"#aaa"}},`「${S.bfGuide?.t}」 읽기 완료 후 순서대로 진행하세요`)));

  // 완료 처리 버튼 (경독 미완료 상태에서 모달 열었을 때)
  const hasIdx=S._bfCompleteIdx>=0;

  const closeBtn=el("button",{style:{background:"none",border:"none",fontSize:"24px",color:"#ccc",cursor:"pointer"}},"×");
  closeBtn.addEventListener("click",()=>{S.bfGuide=null;S._bfCompleteIdx=-1;render();});
  hRow.appendChild(closeBtn);
  modal.appendChild(hRow);

  const dots=el("div",{style:{display:"flex",gap:"6px",marginBottom:"20px",justifyContent:"center"}});
  steps.forEach((_,i)=>{
    const on=i===S.bfStep,done=i<S.bfStep;
    const d=el("div",{style:{height:"10px",borderRadius:"5px",cursor:"pointer",transition:"all .3s",background:on?"#4CAF50":done?"#A5D6A7":"#e0e0e0",width:on?"32px":"10px"}});
    d.addEventListener("click",()=>{S.bfStep=i;render();});
    dots.appendChild(d);
  });
  modal.appendChild(dots);

  const sc=el("div",{style:{background:"#F1F8E9",borderRadius:"16px",padding:"20px 18px",marginBottom:"16px",border:"2px solid #C8E6C9"}});
  sc.appendChild(el("div",{style:{fontSize:"36px",marginBottom:"8px",textAlign:"center"}},s.icon));
  sc.appendChild(el("div",{style:{fontWeight:"800",fontSize:"17px",color:"#2E7D32",marginBottom:"10px",textAlign:"center"}},`${S.bfStep+1}단계. ${s.title}`));
  sc.appendChild(el("div",{style:{fontSize:"13px",color:"#555",lineHeight:"1.75",whiteSpace:"pre-line"}},s.desc));
  if(s.url){const gb=el("button",{style:{width:"100%",marginTop:"14px",padding:"11px",borderRadius:"12px",background:"#43A047",color:"#fff",fontWeight:"700",fontSize:"14px",border:"none",cursor:"pointer"}},s.btn+" →");gb.addEventListener("click",()=>window.open(s.url,"_blank"));sc.appendChild(gb);}
  modal.appendChild(sc);

  const nRow=el("div",{style:{display:"flex",gap:"10px",marginBottom:"12px"}});
  const prev=el("button",{style:{flex:"1",padding:"11px",borderRadius:"12px",border:"2px solid #e0e0e0",background:"#fff",color:S.bfStep===0?"#ccc":"#555",fontWeight:"600",fontSize:"14px",cursor:S.bfStep===0?"default":"pointer"}},"← 이전");
  if(S.bfStep>0)prev.addEventListener("click",()=>{S.bfStep--;render();});
  nRow.appendChild(prev);
  if(S.bfStep<steps.length-1){
    const next=el("button",{style:{flex:"2",padding:"11px",borderRadius:"12px",border:"none",background:"#43A047",color:"#fff",fontWeight:"700",fontSize:"14px",cursor:"pointer"}},"다음 단계 →");
    next.addEventListener("click",()=>{S.bfStep++;render();});
    nRow.appendChild(next);
  } else {
    const doneB=el("button",{style:{flex:"2",padding:"11px",borderRadius:"12px",border:"none",background:"#4CAF50",color:"#fff",fontWeight:"700",fontSize:"14px",cursor:"pointer"}},"독후활동 완료! ✅");
    doneB.addEventListener("click",()=>{
      // 경독 완료 처리
      if(hasIdx){
        const store=getStore();const kd=store[S.kid]||{read:[],borrowed:[]};
        const upd=[...(kd.read||[])];
        upd[S._bfCompleteIdx]={...upd[S._bfCompleteIdx],bfDone:true};
        store[S.kid]={...kd,read:upd};setStore(store);
      }
      S.bfGuide=null;S._bfCompleteIdx=-1;S.tab="read";render();
    });
    nRow.appendChild(doneB);
  }
  modal.appendChild(nRow);
  const hl=el("button",{style:{display:"block",margin:"0 auto",background:"none",border:"none",color:"#4CAF50",fontSize:"13px",cursor:"pointer",fontWeight:"600",textDecoration:"underline"}},"경북독서친구 홈페이지 바로가기");
  hl.addEventListener("click",()=>window.open(BF,"_blank"));
  modal.appendChild(hl);
  overlay.appendChild(modal);
  return overlay;
}

render();
</script>
